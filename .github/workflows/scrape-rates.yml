name: Scrape Exchange Rates

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer@latest
        env:
          PUPPETEER_CACHE_DIR: /home/runner/.cache/puppeteer

      - name: Run scraper
        run: node scraper.js
        timeout-minutes: 14
        continue-on-error: true
        env:
          PUPPETEER_CACHE_DIR: /home/runner/.cache/puppeteer

      - name: Commit updated rates
        run: |
          git config user.name  "RupeeRates Bot"
          git config user.email "bot@rupeerates.in"
          git add rates.json
          git diff --staged --quiet || git commit -m "chore: update rates $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
