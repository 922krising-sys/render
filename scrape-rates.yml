name: Scrape Exchange Rates

# Runs every day at 02:00 UTC = 06:00 UAE time
on:
  schedule:
    - cron: '0 2 * * *'
  # Also lets you run it manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run scraper
        run: node scraper.js

      - name: Commit updated rates
        run: |
          git config user.name  "RupeeRates Bot"
          git config user.email "bot@rupeerates.in"
          git add rates.json
          git diff --staged --quiet || git commit -m "chore: update rates $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
